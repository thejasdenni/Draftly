<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Draftly</title>
</head>
<body>
    <h1>Heffl Weekly Report</h1>
    <div class="container">
        <div class="textArea">
            <input class="topInput" type="text" required>
            <div class="labelLine">Enter Your Name</div>
        </div>
    </div>
    <div class="container">
        <div class="textArea">
            <input class="topInput" type="date" required>
        </div>
    </div>

    <h3>Project Progress Report</h3>
    <div class="container">
        <div class="textArea">
            <input class="topInput" type="text" required>
            <div class="labelLine">Enter your project progress</div>
        </div>
    </div>
    <h3>Blockers</h3>
    <div class="container">
        <div class="textArea">
            <input class="topInput" type="text" required>
            <div class="labelLine">Enter any Blockers you faced</div>
        </div>
    </div>
    <h3>Any Plans for the Next Week</h3>
    <div class="container">
        <div class="textArea">
            <input class="topInput" type="text" required>
            <div class="labelLine">Enter your plans for the next week</div>
        </div>
    </div>

    <p id="saveProgress">Saving...</p>
    <button id="download">Download as PDF</button>
</body>
</html>
