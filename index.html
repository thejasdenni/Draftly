<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Draftly</title>
</head>
<body>
    <h1>Weekly Report</h1>
    <div class="container">
        <div class="textArea">
            <input class="topInput" type="text" required>
            <div class="labelLine">Enter Your Name</div>
        </div>
    </div>
    <div class="container">
        <div class="textArea">
            <input class="topInput" id="'week" type="week" required>
        </div>
    </div>

    <h3>Project Progress Report</h3>
    <div class="container">
        <div class="textArea">
            <input class="topInput" type="text" required>
            <div class="labelLine">Enter your project progress</div>
        </div>
    </div>
    <h3>Blockers</h3>
    <div class="container">
        <div class="textArea">
            <input class="topInput" type="text" required>
            <div class="labelLine">Enter any Blockers you faced</div>
        </div>
    </div>
    <h3>Any Plans for the Next Week</h3>
    <div class="container">
        <div class="textArea">
            <input class="topInput" type="text" required>
            <div class="labelLine">Enter your plans for the next week</div>
        </div>
    </div>

    <p id="saveProgress">Saving...</p>
    <button id="download">Download as PDF</button>
    <script src="script.js""></script>
</body>
</html>
